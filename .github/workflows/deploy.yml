name: CI / CD — Boileau

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS GITHUB À CONFIGURER (Settings → Secrets and variables → Actions)
#
# ── Django / Backend ─────────────────────────────────────────────────────────
#   SECRET_KEY              Clé secrète Django (production)
#   DATABASE_URL            URL de la base (ex: mysql://user:pass@host:3306/db)
#   GEMINI_API_KEY          Clé API Google AI Studio
#   GOOGLE_CLIENT_ID        Client ID OAuth Google
#   ONESIGNAL_APP_ID        App ID OneSignal (push frontend)
#   ONESIGNAL_REST_API_KEY  REST API Key OneSignal (push backend → challenger)
#   REDIS_URL               URL Redis (laisser vide sur O2Switch sans Redis)
#   EMAIL_BACKEND           django.core.mail.backends.smtp.EmailBackend
#   EMAIL_HOST              smtp.gmail.com (ou SMTP O2Switch)
#   EMAIL_HOST_USER         votre-email@gmail.com
#   EMAIL_HOST_PASSWORD     Mot de passe d'application Gmail
#   DEFAULT_FROM_EMAIL      noreply@votre-domaine.com
#   ALLOWED_HOSTS           votre-domaine.com,www.votre-domaine.com
#
# ── Déploiement SSH — O2Switch (cPanel + Phusion Passenger) ─────────────────
#   SSH_HOST            Serveur SSH O2Switch (ex: ssh.cluster0XX.o2switch.net)
#   SSH_USER            Login cPanel O2Switch
#   SSH_PRIVATE_KEY     Clé privée SSH (contenu complet avec -----BEGIN...)
#   DEPLOY_PATH         Chemin absolu du repo sur le serveur
#                       ex: /home/monlogin/boileau
#   PYTHON_BIN          Chemin complet du Python dans le venv créé par cPanel
#                       ex: /home/monlogin/virtualenv/boileau/back/3.12/bin/python
#   FRONTEND_PATH       Dossier où copier le build React (racine du domaine/sous-domaine)
#                       ex: /home/monlogin/public_html  (ou dossier du sous-domaine)
#   REACT_APP_API_BASE_URL  URL de l'API en prod (ex: https://votre-domaine.com/api)
#
# ── Comment trouver PYTHON_BIN sur O2Switch ──────────────────────────────────
#   cPanel → Python App Manager → votre app → "Enter to the virtual environment"
#   → copier la commande source … et utiliser le dossier bin/python
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests backend Django
  # ───────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: boileau
          POSTGRES_PASSWORD: boileau
          POSTGRES_DB: boileau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/requirements.txt

      - name: Installer les dépendances Python
        run: pip install -r back/requirements.txt

      - name: Vérifier la structure Django
        working-directory: back
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: "true"
          DATABASE_URL: postgres://boileau:boileau@localhost:5432/boileau_test
          GEMINI_MOCK_MODE: "true"
          ALLOWED_HOSTS: localhost
        run: |
          python manage.py check
          python manage.py migrate --run-syncdb
          python manage.py test --verbosity=1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend React
  # ───────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/user/package-lock.json

      - name: Installer les dépendances npm
        working-directory: front/user
        run: npm ci

      - name: Build React
        working-directory: front/user
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          CI: "false"
        run: npm run build

      - name: Archiver le build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: front/user/build/
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Déploiement sur O2Switch (SSH)
  # S'exécute uniquement sur push vers main/master (pas sur les PR).
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Déploiement O2Switch
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Télécharger le build frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist/

      - name: Copier le build React vers le dossier public du domaine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend-dist/"
          target: "${{ secrets.FRONTEND_PATH }}"
          strip_components: 1   # supprime "frontend-dist/" du chemin distant

      - name: Déployer le backend sur O2Switch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "=== Pull du code ==="
            git pull origin main

            echo "=== Installation des dépendances Python ==="
            cd back
            ${{ secrets.PYTHON_BIN }} -m pip install -r requirements.txt --quiet

            echo "=== Écriture du .env de production ==="
            cat > .env << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=false
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL=gemini-2.5-flash
            GEMINI_MOCK_MODE=false
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
            ONESIGNAL_REST_API_KEY=${{ secrets.ONESIGNAL_REST_API_KEY }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            ENVEOF

            echo "=== Migrations ==="
            ${{ secrets.PYTHON_BIN }} manage.py migrate --no-input

            echo "=== Fichiers statiques ==="
            ${{ secrets.PYTHON_BIN }} manage.py collectstatic --no-input --clear

            echo "=== Redémarrage Passenger ==="
            mkdir -p tmp && touch tmp/restart.txt

            echo "=== Déploiement terminé ==="
