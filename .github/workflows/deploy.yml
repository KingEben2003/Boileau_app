name: CI / CD — Boileau

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS GITHUB À CONFIGURER (Settings → Secrets and variables → Actions) :
#
#   SECRET_KEY          Clé secrète Django (production)
#   DATABASE_URL        URL de la base de données de production
#   GEMINI_API_KEY      Clé API Google Gemini
#   GOOGLE_CLIENT_ID    Client ID OAuth Google
#   ONESIGNAL_APP_ID    App ID OneSignal
#   REDIS_URL           URL Redis (laisser vide si pas encore dispo)
#   EMAIL_BACKEND       django.core.mail.backends.smtp.EmailBackend
#   EMAIL_HOST          smtp.gmail.com
#   EMAIL_HOST_USER     votre-email@gmail.com
#   EMAIL_HOST_PASSWORD mot de passe d'application Gmail
#   DEFAULT_FROM_EMAIL  noreply@boileau.app
#
#   Pour le déploiement SSH sur VPS :
#   SSH_HOST            IP ou domaine du serveur
#   SSH_USER            Utilisateur SSH (ex: ubuntu, deploy)
#   SSH_PRIVATE_KEY     Clé privée SSH (contenu complet, inclus -----BEGIN...)
#   DEPLOY_PATH         Chemin du projet sur le serveur (ex: /var/www/boileau)
#   REACT_APP_API_BASE_URL  URL API en production (ex: https://boileau.app/api)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests backend Django
  # ───────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: boileau
          POSTGRES_PASSWORD: boileau
          POSTGRES_DB: boileau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/requirements.txt

      - name: Installer les dépendances Python
        run: pip install -r back/requirements.txt

      - name: Vérifications Django (structure + migrations)
        working-directory: back
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: "true"
          DATABASE_URL: postgres://boileau:boileau@localhost:5432/boileau_test
          GEMINI_MOCK_MODE: "true"
          ALLOWED_HOSTS: localhost
        run: |
          python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true
          python manage.py migrate --run-syncdb
          python manage.py test --verbosity=2

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend React
  # ───────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/user/package-lock.json

      - name: Installer les dépendances npm
        working-directory: front/user
        run: npm ci

      - name: Build React
        working-directory: front/user
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          CI: "false"   # évite que les warnings React soient traités comme des erreurs
        run: npm run build

      - name: Archiver le build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: front/user/build/
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Déploiement sur serveur (SSH)
  # Ne s'exécute que sur push vers main/master (pas sur les PR).
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Déploiement production
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Télécharger le build frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: front/user/build/

      - name: Copier le build sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "front/user/build/"
          target: "${{ secrets.DEPLOY_PATH }}/front/user/"
          strip_components: 3   # supprime front/user/build du chemin distant

      - name: Déployer sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "── Pull du code ──"
            git pull origin main

            echo "── Backend ──"
            cd back
            source .venv/bin/activate

            pip install -r requirements.txt --quiet

            # Écriture du .env de production depuis les secrets GitHub
            cat > .env <<EOF
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=false
            ALLOWED_HOSTS=${{ secrets.SSH_HOST }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL=gemini-2.5-flash
            GEMINI_MOCK_MODE=false
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
            EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            EOF

            python manage.py migrate --no-input
            python manage.py collectstatic --no-input --clear
            python manage.py cleanup_ws_tickets

            echo "── Redémarrage Daphne ──"
            sudo systemctl restart boileau-backend

            echo "── Rechargement Nginx ──"
            sudo systemctl reload nginx

            echo "── Déploiement terminé ✓ ──"
