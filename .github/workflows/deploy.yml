name: CI / CD — Boileau

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS GITHUB À CONFIGURER (Settings → Secrets and variables → Actions)
#
# ── Django / Backend ─────────────────────────────────────────────────────────
#   SECRET_KEY              Clé secrète Django (production)
#   DATABASE_URL            URL de la base (ex: mysql://user:pass@localhost:3306/db)
#   GEMINI_API_KEY          Clé API Google AI Studio
#   GOOGLE_CLIENT_ID        Client ID OAuth Google
#   ONESIGNAL_APP_ID        App ID OneSignal (push frontend)
#   ONESIGNAL_REST_API_KEY  REST API Key OneSignal (push backend)
#   REDIS_URL               URL Redis (laisser vide si pas de Redis)
#   EMAIL_BACKEND           django.core.mail.backends.smtp.EmailBackend
#   EMAIL_HOST              smtp.gmail.com (ou SMTP O2Switch)
#   EMAIL_HOST_USER         votre-email@gmail.com
#   EMAIL_HOST_PASSWORD     Mot de passe d'application Gmail
#   DEFAULT_FROM_EMAIL      noreply@votre-domaine.com
#   ALLOWED_HOSTS           votre-domaine.com,www.votre-domaine.com
#   CORS_ALLOWED_ORIGINS    https://app.votre-domaine.com,https://admin.app.votre-domaine.com
#
# ── React ────────────────────────────────────────────────────────────────────
#   REACT_APP_API_BASE_URL  URL de l'API (ex: https://votre-domaine.com/api)
#
# ── Déploiement O2Switch (cron) ──────────────────────────────────────────────
# Aucun secret SSH ni webhook requis pour le déploiement.
# O2Switch bloque le port 22 ET les requêtes HTTP automatisées (Tiger Protect)
# depuis les IPs GitHub Actions. Solution : un cron job sur O2Switch surveille
# la branche "deploy" toutes les minutes et se déploie lui-même.
# Voir o2switch_setup/deploy_check.sh et les instructions dans ce dossier.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests backend Django
  # ───────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: boileau
          POSTGRES_PASSWORD: boileau
          POSTGRES_DB: boileau_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/requirements.txt

      - name: Installer les dépendances Python
        run: pip install -r back/requirements.txt

      - name: Vérifier la structure Django
        working-directory: back
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: "true"
          DATABASE_URL: postgres://boileau:boileau@localhost:5432/boileau_test
          GEMINI_MOCK_MODE: "true"
          ALLOWED_HOSTS: localhost
        run: |
          python manage.py check
          python manage.py migrate --run-syncdb
          python manage.py test --verbosity=1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build React app utilisateur
  # ───────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend (user)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances npm
        working-directory: front/user
        run: npm install --legacy-peer-deps

      - name: Build React user
        working-directory: front/user
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          CI: "false"
        run: npm run build

      - name: Archiver le build user
        uses: actions/upload-artifact@v4
        with:
          name: frontend-user-build
          path: front/user/build/
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build React app admin
  # ───────────────────────────────────────────────────────────────────────────
  build-admin:
    name: Build frontend (admin)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances npm
        working-directory: front/admin
        run: npm install --legacy-peer-deps

      - name: Build React admin
        working-directory: front/admin
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          CI: "false"
        run: npm run build

      - name: Archiver le build admin
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-build
          path: front/admin/build/
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Déploiement sur O2Switch via webhook HTTPS
  #
  # Pourquoi webhook ? O2Switch bloque le port 22 (SSH) depuis les IPs GitHub
  # Actions (plage Azure). Le webhook tourne en HTTPS (port 443), non bloqué.
  # Le serveur O2Switch tire le code et les builds lui-même (git pull HTTPS).
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Déploiement O2Switch
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, build-admin]
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Télécharger le build React user
        uses: actions/download-artifact@v4
        with:
          name: frontend-user-build
          path: front/user/build/

      - name: Télécharger le build React admin
        uses: actions/download-artifact@v4
        with:
          name: frontend-admin-build
          path: front/admin/build/

      - name: Pousser les builds sur la branche deploy
        run: |
          git config user.email "ci@github-actions.bot"
          git config user.name "GitHub Actions"

          # Crée ou réinitialise la branche deploy depuis main
          git checkout -B deploy

          # Force l'ajout des builds (ignorés par .gitignore en dev)
          git add -f front/user/build/ front/admin/build/

          # Commit seulement s'il y a des changements
          git diff --cached --quiet \
            && echo "Builds inchangés, pas de commit." \
            || git commit -m "ci: builds React $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          git push origin deploy --force

      - name: Déploiement confirmé
        run: |
          echo "Branche deploy mise à jour avec succès."
          echo "Le cron job O2Switch (toutes les minutes) détectera"
          echo "le nouveau commit et lancera le déploiement automatiquement."
          echo "Consultez ~/deploy.log sur O2Switch pour suivre l'avancement."
